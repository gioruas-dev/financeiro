<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Controle Financeiro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --dark: #1A2332; --teal: #00B4A6; --teal2: #008F84;
    --green: #27AE60; --red: #E74C3C; --light: #F4F7FA;
    --gray: #DDE3EA; --mid: #8896A8; --white: #FFFFFF;
  }
  body { font-family: 'Sora', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; padding: 20px; max-width: 480px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 24px; padding-top: 10px; }
  .header h1 { font-size: 24px; font-weight: 700; color: var(--teal); letter-spacing: -0.5px; }
  .header p { font-size: 12px; color: var(--mid); margin-top: 6px; }
  .status-bar { display: flex; align-items: center; gap: 8px; background: rgba(0,180,166,0.1); border: 1px solid rgba(0,180,166,0.3); border-radius: 8px; padding: 10px 14px; margin-bottom: 18px; font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .input-area { background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; margin-bottom: 16px; transition: border-color 0.2s; }
  .input-area:focus-within { border-color: var(--teal); }
  .input-label { font-size: 11px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--white); font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.7; resize: none; min-height: 100px; }
  textarea::placeholder { color: var(--mid); }
  .examples { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: var(--mid); line-height: 1.8; }
  .btn-primary { width: 100%; padding: 15px; background: var(--teal); color: var(--dark); font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
  .btn-primary:hover { background: var(--teal2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .preview-section { display: none; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .preview-title { font-size: 11px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .entry-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; }
  .entry-main { display: flex; flex-direction: column; gap: 8px; }
  .entry-desc { font-size: 14px; font-weight: 600; color: var(--white); }
  .entry-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .tag-rec { background: rgba(39,174,96,0.2); color: var(--green); border: 1px solid rgba(39,174,96,0.4); }
  .tag-desp { background: rgba(231,76,60,0.15); color: var(--red); border: 1px solid rgba(231,76,60,0.3); }
  .entry-valor { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 600; text-align: right; white-space: nowrap; padding-top: 2px; }
  .val-desp { color: var(--red); } .val-rec { color: var(--green); }
  .cat-select { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: var(--white); font-family: 'Sora', sans-serif; font-size: 11px; padding: 4px 8px; border-radius: 6px; cursor: pointer; outline: none; max-width: 160px; }
  .cat-select option { background: #1A2332; color: var(--white); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .btn-confirm { padding: 14px; background: var(--green); color: var(--white); font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  .btn-confirm:hover { filter: brightness(1.1); }
  .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { padding: 14px; background: transparent; color: var(--mid); font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  .btn-cancel:hover { border-color: var(--mid); color: var(--white); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--teal); color: var(--dark); font-weight: 700; font-size: 13px; padding: 13px 28px; border-radius: 50px; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); z-index: 100; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); color: var(--white); }
  .history { margin-top: 20px; display: none; }
  .history-title { font-size: 11px; font-weight: 600; color: var(--mid); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 5px; font-size: 12px; }
  .history-desc { color: var(--mid); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-cat { color: var(--teal); margin: 0 10px; font-size: 10px; flex-shrink: 0; }
  .history-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; flex-shrink: 0; }
  .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--white); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 20px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>💰 Controle Financeiro</h1>
  <p>Giovanni Ruas · Lançamentos diários</p>
</div>

<div class="status-bar">
  <div class="dot"></div>
  <span id="status-text">Conectado ao Google Sheets</span>
</div>

<div class="input-area">
  <div class="input-label">📝 O que você gastou hoje?</div>
  <textarea id="input" placeholder="shellbox 150&#10;leal 87,50&#10;uber 22&#10;drogasil 45&#10;salário 8000"></textarea>
  <div class="examples">
    <strong style="color:rgba(255,255,255,0.7)">Como digitar:</strong><br>
    nome do lugar + valor · um por linha<br>
    "shellbox 150" · "leal 87,50" · "uber 22"
  </div>
</div>

<button class="btn-primary" id="btn-processar" onclick="processar()">
  ✨ Processar e categorizar
</button>

<div class="preview-section" id="preview">
  <div class="preview-title">✅ Confirme os lançamentos</div>
  <div id="entries-list"></div>
  <div class="btn-row">
    <button class="btn-confirm" id="btn-confirm" onclick="confirmar()">
      📤 Enviar para Sheets
    </button>
    <button class="btn-cancel" onclick="cancelar()">Cancelar</button>
  </div>
</div>

<div class="history" id="history">
  <div class="divider"></div>
  <div class="history-title">📋 Enviados nesta sessão</div>
  <div id="history-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwremuBOU6ZgzEUcyQO50PEPgcY_5If3WRzsM8zsFQogJ25a9nZGTyAtQNAfuNAQBSuZA/exec";

const KEYWORDS = {
  "leal": "Supermercado", "mart minas": "Supermercado", "mn super": "Supermercado",
  "supermercado": "Supermercado", "via fruta": "Supermercado", "luciana carnes": "Supermercado",
  "tiagocarnes": "Supermercado", "emporio dias": "Supermercado", "bahamas": "Supermercado",
  "mercado": "Supermercado", "sams club": "Supermercado", "carreon": "Supermercado",
  "mm comercio": "Supermercado", "vida nova": "Supermercado",
  "shellbox": "Combustível", "posto": "Combustível", "gasolina": "Combustível",
  "combustivel": "Combustível", "combustível": "Combustível",
  "estanciadocupim": "Restaurante", "dominos": "Restaurante", "pizza": "Restaurante",
  "marinez": "Restaurante", "talharim": "Restaurante", "churrascaria": "Restaurante",
  "pastel": "Restaurante", "jeronimo": "Restaurante", "no espeto": "Restaurante",
  "ifood": "Restaurante", "restaurante": "Restaurante", "lanchonete": "Restaurante",
  "emporio": "Restaurante", "bahamas": "Restaurante",
  "drogasil": "Farmácia", "drogalider": "Farmácia", "farmacia": "Farmácia", "farmácia": "Farmácia",
  "dentista": "Saúde", "medico": "Saúde", "médico": "Saúde", "consulta": "Saúde",
  "granado": "Saúde", "jim.com": "Saúde", "saude": "Saúde", "odonto": "Saúde",
  "netflix": "Assinaturas", "spotify": "Assinaturas", "amazon prime": "Assinaturas",
  "amazonprime": "Assinaturas", "google one": "Assinaturas", "apple": "Assinaturas",
  "microsoft": "Assinaturas", "canva": "Assinaturas", "claude": "Assinaturas",
  "youtube": "Assinaturas", "brasil paral": "Assinaturas",
  "shopee": "Compras", "amazon": "Compras", "mercadolivre": "Compras",
  "centauro": "Compras", "renner": "Compras", "autozone": "Compras",
  "cristiane": "Salão/Beleza", "visage": "Salão/Beleza", "cabeleireiro": "Salão/Beleza",
  "oboticario": "Salão/Beleza", "salao": "Salão/Beleza", "salão": "Salão/Beleza",
  "studio concept": "Salão/Beleza", "gruposantana": "Salão/Beleza",
  "uber": "Uber", "99pop": "Uber", "taxi": "Uber",
  "colegio": "Educação", "colégio": "Educação", "escola": "Educação", "curso": "Educação",
  "condominio": "Moradia", "condomínio": "Moradia", "aluguel": "Moradia",
  "cemig": "Moradia", "dmae": "Moradia", "internet": "Moradia", "algar": "Moradia",
  "mapfre": "Carro/Seguro", "allianz": "Carro/Seguro", "autoglass": "Carro/Seguro",
  "seguro": "Carro/Seguro", "ipva": "Carro/Seguro", "bradesco auto": "Carro/Seguro",
  "viagem": "Viagens/Lazer", "hotel": "Viagens/Lazer", "cinema": "Viagens/Lazer",
  "sextaigreja": "Viagens/Lazer", "cramg": "Viagens/Lazer",
  "dizimo": "Igreja/Dízimo", "dízimo": "Igreja/Dízimo", "igreja": "Igreja/Dízimo",
  "salario": "Receita", "salário": "Receita", "receita": "Receita", "freelance": "Receita",
};

const CATS = ["Supermercado","Restaurante","Combustível","Farmácia","Saúde",
  "Assinaturas","Compras","Salão/Beleza","Uber","Educação",
  "Moradia","Carro/Seguro","Viagens/Lazer","Igreja/Dízimo","Receita","Outros"];

let parsedEntries = [];
let sessionHistory = [];

function categorizar(desc) {
  const d = desc.toLowerCase();
  for (const [kw, cat] of Object.entries(KEYWORDS)) {
    if (d.includes(kw)) return cat;
  }
  return "Outros";
}

function parseValor(str) {
  return parseFloat(str.replace(',', '.')) || 0;
}

function formatBRL(val) {
  return "R$ " + val.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function hoje() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function processar() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) return showToast("Digite pelo menos um lançamento", true);

  const lines = raw.split('\n').filter(l => l.trim());
  parsedEntries = [];

  for (const line of lines) {
    const trimmed = line.trim();
    const match = trimmed.match(/^(.*?)\s+([\d]+[.,]?\d*)$/);
    if (!match) continue;
    const desc = match[1].trim();
    const valor = parseValor(match[2]);
    if (!desc || valor <= 0) continue;
    const cat = categorizar(desc);
    const tipo = cat === "Receita" ? "Receita" : "Despesa";
    parsedEntries.push({ data: hoje(), descricao: desc, valor, tipo, categoria: cat });
  }

  if (!parsedEntries.length) return showToast("Formato inválido. Use: 'descrição valor'", true);
  renderPreview();
}

function renderPreview() {
  const list = document.getElementById('entries-list');
  list.innerHTML = '';
  parsedEntries.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'entry-card';
    const isRec = e.tipo === 'Receita';
    div.innerHTML = `
      <div class="entry-main">
        <div class="entry-desc">${e.descricao}</div>
        <div class="entry-meta">
          <span class="tag ${isRec ? 'tag-rec' : 'tag-desp'}">${e.tipo}</span>
          <select class="cat-select" onchange="parsedEntries[${i}].categoria=this.value; parsedEntries[${i}].tipo=this.value==='Receita'?'Receita':'Despesa'">
            ${CATS.map(c => `<option value="${c}" ${c===e.categoria?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="entry-valor ${isRec ? 'val-rec' : 'val-desp'}">${formatBRL(e.valor)}</div>
    `;
    list.appendChild(div);
  });
  document.getElementById('preview').style.display = 'block';
  document.getElementById('preview').scrollIntoView({ behavior: 'smooth' });
}

async function confirmar() {
  const btn = document.getElementById('btn-confirm');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>Enviando...';

  try {
    const payload = encodeURIComponent(JSON.stringify({ lancamentos: parsedEntries }));
    const url = `${SHEETS_URL}?data=${payload}`;
    const response = await fetch(url);
    const result = await response.json();

    if (result.status === 'success' || result.status === 'ok') {
      parsedEntries.forEach(e => sessionHistory.unshift(e));
      renderHistory();
      showToast(`✅ ${parsedEntries.length} lançamento(s) salvo(s)!`);
      document.getElementById('input').value = '';
      document.getElementById('preview').style.display = 'none';
      parsedEntries = [];
    } else {
      throw new Error(result.message || 'Erro desconhecido');
    }
  } catch(err) {
    showToast("Erro ao enviar: " + err.message, true);
  }

  btn.disabled = false;
  btn.innerHTML = '📤 Enviar para Sheets';
}

function cancelar() {
  document.getElementById('preview').style.display = 'none';
  parsedEntries = [];
}

function renderHistory() {
  if (!sessionHistory.length) return;
  const el = document.getElementById('history');
  const list = document.getElementById('history-list');
  el.style.display = 'block';
  list.innerHTML = sessionHistory.slice(0, 10).map(e => `
    <div class="history-item">
      <span class="history-desc">${e.descricao}</span>
      <span class="history-cat">${e.categoria}</span>
      <span class="history-val ${e.tipo==='Receita'?'val-rec':'val-desp'}">${formatBRL(e.valor)}</span>
    </div>
  `).join('');
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 3500);
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') processar();
});
</script>
</body>
</html>
